<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Framework</title>
    <script>
      // GitHub Pages SPA 路由还原：从 404.html 中读取原始路径并恢复
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          // 去掉 /dashboard 前缀（如果有），得到应用内部路径
          var appPath = redirect.replace(/^\/dashboard/, '');
          if (appPath.charAt(0) !== '/') appPath = '/' + appPath;
          // 重新拼回 /dashboard 前缀，与 BrowserRouter basename 一致
          var fullPath = '/dashboard' + appPath;
          history.replaceState(null, '', fullPath);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
